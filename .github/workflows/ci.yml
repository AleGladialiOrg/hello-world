name: CI
  on:
    push:
      branches: [main]
  
  jobs:
    build:  
      runs-on: ubuntu-latest
      permissions:
        packages: write
        contents: read
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with: { java-version: '21', distribution: 'temurin' }
        - run: mvn package -DskipTests
        - name: Login to GHCR   
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push image
          run: |
            IMAGE="ghcr.io/$(echo $GITHUB_REPOSITORY | tr '[:upper:]' '[:lower:]'):$GITHUB_SHA"
            docker build -t "$IMAGE" .
            docker push "$IMAGE"
        - name: Checkout helm-charts
          uses: actions/checkout@v4
          with:
            repository: AleGladialiOrg/helm-charts
            token: ${{ secrets.HELM_TOKEN }}
            path: helm-charts-repo 
        - name: Update Helm values
          run: |
            sed -i "s|tag:.*|tag: $GITHUB_SHA|" helm-charts-repo/apps/hello-world/values.yaml
            cd helm-charts-repo
            git config user.email "ci@github.com"
            git config user.name "GitHub Actions"
            git add apps/hello-world/values.yaml
            git commit -m "Update hello-world tag to $GITHUB_SHA"
            git push
